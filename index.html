<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bar do Castelo Almourol — Menu</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0f0f10;color:#fff;margin:0;min-height:100vh;display:grid;place-items:center}
    .card{width:min(520px,92vw);background:#18181b;border:1px solid #2a2a2f;border-radius:18px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{font-size:20px;margin:0 0 6px}
    p{margin:0 0 18px;color:#cfcfd6}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    a{display:flex;align-items:center;justify-content:space-between;text-decoration:none;background:#101013;border:1px solid #2a2a2f;border-radius:14px;padding:14px 14px;color:#fff}
    a:hover{border-color:#4a4a55}
    .left{display:flex;gap:10px;align-items:center}
    .flag{font-size:22px}
    .lang{font-weight:700}
    .hint{color:#cfcfd6;font-size:13px}
    .arrow{opacity:.75}
    footer{margin-top:14px;color:#a8a8b3;font-size:12px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Bar do Castelo Almourol</h1>
    <p>Escolhe a tua língua / Choose your language</p>
    <div class="grid">
      <a href="menu_pt.pdf"><span class="left"><span class="flag">🇵🇹</span><span><div class="lang">Português</div><div class="hint">Menu (PDF)</div></span></span><span class="arrow">›</span></a>
      <a href="menu_en.pdf"><span class="left"><span class="flag">🇬🇧</span><span><div class="lang">English</div><div class="hint">Menu (PDF)</div></span></span><span class="arrow">›</span></a>
      <a href="menu_es.pdf"><span class="left"><span class="flag">🇪🇸</span><span><div class="lang">Español</div><div class="hint">Menú (PDF)</div></span></span><span class="arrow">›</span></a>
      <a href="menu_fr.pdf"><span class="left"><span class="flag">🇫🇷</span><span><div class="lang">Français</div><div class="hint">Menu (PDF)</div></span></span><span class="arrow">›</span></a>
      <a href="menu_de.pdf"><span class="left"><span class="flag">🇩🇪</span><span><div class="lang">Deutsch</div><div class="hint">Speisekarte (PDF)</div></span></span><span class="arrow">›</span></a>
    </div>
    <footer>Tip: guarda este link nos favoritos — funciona em qualquer telemóvel.</footer>
  </main>
</body>
</html>
